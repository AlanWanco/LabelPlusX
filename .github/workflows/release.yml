name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  desktop:
    name: Release ${{ matrix.platform.label }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - label: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
          - label: linux-amd64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - label: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - label: windows-amd64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          - label: windows-arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.platform.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Install Linux dependencies
        if: startsWith(matrix.platform.runner, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build desktop bundle
        run: npm run tauri build -- --target ${{ matrix.platform.target }}

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform.label }}
          path: src-tauri/target/${{ matrix.platform.target }}/release/bundle
          if-no-files-found: error

  docker:
    name: Release Docker image
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/labelplusx
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    name: Publish GitHub Release
    needs:
      - desktop
      - docker
    runs-on: ubuntu-22.04

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: release-*
          merge-multiple: false

      - name: Collect release files
        run: mkdir -p release-files && find release-artifacts -type f \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "*.msi" -o -name "*.exe" \) -exec cp {} release-files/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-files/*
